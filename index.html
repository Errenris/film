<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse | Liquid Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #05050a; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); }
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
            /* Ambient glowing background */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(20, 50, 150, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(100, 20, 150, 0.15), transparent 25%);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* LIQUID GLASS EFFECT */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .movie-card { width: 150px; flex-shrink: 0; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @media (min-width: 768px) { .movie-card { width: 170px; } }
        .movie-card:hover { transform: translateY(-10px) scale(1.05); }
        
        .poster-container {
            aspect-ratio: 2/3;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        /* Glass button untuk scroll */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
    </style>
</head>
<body class="pb-20">

    <!-- Floating Glass Navbar -->
    <header class="fixed top-4 w-full z-[100] px-4 md:px-8">
        <div class="glass-panel max-w-7xl mx-auto rounded-full px-6 py-3 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 cursor-pointer tracking-widest" onclick="location.reload()">STREAMVERSE</h1>
            
            <div class="relative w-40 md:w-64">
                <input type="text" id="searchInput" placeholder="Cari film..." 
                       class="w-full bg-black/20 border border-white/10 px-4 py-2 rounded-full text-sm focus:outline-none focus:border-blue-400 focus:bg-white/5 transition-all text-white placeholder-gray-400 backdrop-blur-md">
                <button onclick="searchMovie()" class="absolute right-3 top-2 opacity-60 hover:opacity-100 transition">🔍</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-28 px-4 space-y-10">
        
        <!-- Search Section -->
        <section id="searchSection" class="hidden glass-panel rounded-3xl p-6">
            <h2 class="text-xl font-bold mb-6 text-blue-300">Hasil Pencarian</h2>
            <div id="searchResults" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4"></div>
        </section>

        <!-- Row: Trending -->
        <section class="glass-panel rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white tracking-wide">Sedang Tren</h2>
                <div class="flex gap-2">
                    <button onclick="sideScroll('trendingRow', 'left')" class="glass-btn w-10 h-10 rounded-full flex items-center justify-center">❮</button>
                    <button onclick="sideScroll('trendingRow', 'right')" class="glass-btn w-10 h-10 rounded-full flex items-center justify-center">❯</button>
                </div>
            </div>
            <div id="trendingRow" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4"></div>
        </section>

        <!-- Row: Action -->
        <section class="glass-panel rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white tracking-wide">Film Aksi Pilihan</h2>
                <div class="flex gap-2">
                    <button onclick="sideScroll('actionRow', 'left')" class="glass-btn w-10 h-10 rounded-full flex items-center justify-center">❮</button>
                    <button onclick="sideScroll('actionRow', 'right')" class="glass-btn w-10 h-10 rounded-full flex items-center justify-center">❯</button>
                </div>
            </div>
            <div id="actionRow" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4"></div>
        </section>
        
    </main>

    <!-- Glass Player Modal -->
    <div id="playerContainer" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <!-- Background Blur Heavy -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-xl" onclick="closePlayer()"></div>
        
        <!-- Player Container -->
        <div class="glass-panel relative w-full max-w-5xl rounded-[2rem] p-2 md:p-4 shadow-[0_0_50px_rgba(50,100,250,0.2)]">
            <button onclick="closePlayer()" class="absolute -top-4 -right-4 md:-top-6 md:-right-6 glass-btn bg-red-500/20 w-12 h-12 rounded-full flex items-center justify-center text-xl z-[210] hover:bg-red-500/50">✕</button>
            <div class="aspect-video rounded-2xl overflow-hidden bg-black">
                <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="mt-4 px-2 pb-2">
                <h3 id="playingTitle" class="text-lg md:text-xl font-bold text-blue-200 tracking-wide"></h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
