<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse - Nonton Movie Sub Indo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #0a0c0f; --bg-card: #16191e; --accent: #3498db; }
        body { background-color: var(--bg-main); color: #ecf0f1; font-family: 'Roboto', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .movie-card { width: 140px; transition: transform 0.2s; flex-shrink: 0; }
        @media (min-width: 768px) { .movie-card { width: 170px; } }
        .movie-card:hover { transform: scale(1.05); }
        .poster-wrapper { position: relative; aspect-ratio: 2/3; border-radius: 4px; overflow: hidden; background: #1a1d22; }
        .rating-tag { position: absolute; top: 5px; left: 5px; background: rgba(229, 9, 20, 0.9); font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 3px; }
        .quality-tag { position: absolute; bottom: 5px; right: 5px; background: var(--accent); font-size: 9px; padding: 1px 4px; border-radius: 2px; }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <header class="bg-[#16191e] border-b border-gray-800 sticky top-0 z-[100] px-4 py-3 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 tracking-tighter cursor-pointer" onclick="location.reload()">STREAMVERSE</h1>
            
            <div class="flex-1 max-w-md relative">
                <input type="text" id="searchInput" placeholder="Cari Movie atau TV Series..." 
                       class="w-full bg-[#0a0c0f] border border-gray-700 px-4 py-2 rounded text-sm focus:outline-none focus:border-blue-500 transition">
                <button onclick="searchMovie()" class="absolute right-3 top-2 text-gray-500">🔍</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto mt-6 px-4 space-y-8">
        
        <!-- Hero / Featured (Optional - Simpel) -->
        <section id="hero" class="hidden relative h-64 md:h-80 rounded-xl overflow-hidden shadow-2xl">
            <div id="heroBg" class="absolute inset-0 bg-cover bg-center"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-black to-transparent"></div>
            <div class="relative h-full flex flex-col justify-center p-8 max-w-lg">
                <h2 id="heroTitle" class="text-3xl font-bold mb-2"></h2>
                <p id="heroDesc" class="text-sm text-gray-300 line-clamp-2 mb-4"></p>
                <button id="heroPlayBtn" class="w-max bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-bold transition">Nonton Sekarang</button>
            </div>
        </section>

        <!-- Search Section -->
        <section id="searchSection" class="hidden">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🔍 Hasil Pencarian</h2>
            <div id="searchResults" class="flex gap-3 overflow-x-auto no-scrollbar pb-4 scroll-smooth"></div>
        </section>

        <!-- Row: Trending -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 border-l-4 border-blue-500 pl-3 uppercase tracking-wider">🔥 Terpopuler</h2>
                <div class="flex gap-2">
                    <button onclick="sideScroll('trendingRow', 'left')" class="bg-gray-800 p-1 rounded hover:bg-blue-600 transition">❮</button>
                    <button onclick="sideScroll('trendingRow', 'right')" class="bg-gray-800 p-1 rounded hover:bg-blue-600 transition">❯</button>
                </div>
            </div>
            <div id="trendingRow" class="flex gap-3 overflow-x-auto no-scrollbar scroll-smooth"></div>
        </section>

        <!-- Row: Action -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 border-l-4 border-blue-500 pl-3 uppercase tracking-wider">🎥 Film Aksi</h2>
                <div class="flex gap-2">
                    <button onclick="sideScroll('actionRow', 'left')" class="bg-gray-800 p-1 rounded hover:bg-blue-600 transition">❮</button>
                    <button onclick="sideScroll('actionRow', 'right')" class="bg-gray-800 p-1 rounded hover:bg-blue-600 transition">❯</button>
                </div>
            </div>
            <div id="actionRow" class="flex gap-3 overflow-x-auto no-scrollbar scroll-smooth"></div>
        </section>

    </main>

    <!-- Player Modal -->
    <div id="playerContainer" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-2 md:p-10">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closePlayer()"></div>
        <div class="relative w-full max-w-5xl bg-black rounded-lg overflow-hidden">
            <button onclick="closePlayer()" class="absolute top-4 right-4 z-[210] bg-white/20 hover:bg-red-600 w-8 h-8 rounded-full flex items-center justify-center transition">✕</button>
            <div class="aspect-video">
                <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="p-4 bg-[#16191e]">
                <h3 id="playingTitle" class="font-bold text-blue-400"></h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
