<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOBARGASI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #030305; 
            --accent: #ffffff; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
        }
        body { background-color: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        /* AMBIENT BACKGROUND (BUNGLON) */
        #ambientBg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: background 1.5s ease; filter: blur(120px) saturate(1.5); opacity: 0.35; transform: scale(1.1); }
        .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg) 80%); z-index: -1; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* DYNAMIC ISLAND HEADER */
        #mainHeader { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .header-capsule { background: rgba(10, 10, 15, 0.6); backdrop-filter: blur(25px); border: 1px solid var(--border); padding: 8px 24px; border-radius: 100px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* ZEN MOVIE CARD */
        .movie-card { width: 140px; flex-shrink: 0; cursor: pointer; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); position: relative; }
        @media (min-width: 768px) { .movie-card { width: 190px; } }
        .movie-card:hover { transform: scale(1.05); z-index: 10; }
        .poster-container { aspect-ratio: 2/3; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid transparent; transition: 0.3s; background: var(--glass); }
        .movie-card:hover .poster-container { border-color: rgba(255,255,255,0.3); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        /* NETFLIX NUMBERS (MINIMAL VERSION) */
        .netflix-number { position: absolute; left: -20px; bottom: -10px; font-size: 100px; font-weight: 900; color: transparent; -webkit-text-stroke: 1.5px rgba(255,255,255,0.2); line-height: 1; z-index: 1; pointer-events: none; }
        @media (min-width: 768px) { .netflix-number { font-size: 160px; left: -30px; } }

        .universe-title { font-size: 10px; font-weight: 900; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 12px; padding-left: 8px; }
        
        /* PLAYER ZEN */
        .glass-panel { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(30px); border: 1px solid var(--border); }
        
        #liveNotif { position: fixed; left: 30px; bottom: 30px; z-index: 1000; opacity: 0; transform: translateY(20px); transition: 0.5s; pointer-events: none; }
        #liveNotif.show { opacity: 1; transform: translateY(0); }

        .fade-out { opacity: 0.2; filter: blur(5px); pointer-events: none; }
        .magnetic { transition: 0.2s cubic-bezier(0.2, 1, 0.3, 1); }
    </style>
</head>
<body class="pb-20">

    <div id="ambientBg"></div>
    <div class="overlay"></div>

    <div id="liveNotif" class="glass-panel px-5 py-3 rounded-full flex items-center gap-3 shadow-2xl">
        <div id="notifImg" class="w-8 h-8 rounded-full bg-cover"></div>
        <p id="notifText" class="text-[11px] font-bold tracking-tight text-white/80"></p>
    </div>

    <div class="fixed top-6 w-full z-[100] flex justify-center px-4">
        <header id="mainHeader" class="header-capsule flex items-center gap-8">
            <h1 class="text-xl font-black tracking-tighter cursor-pointer" onclick="goHome()">N<span class="opacity-30">G</span></h1>
            
            <nav class="hidden md:flex items-center gap-6 text-[11px] font-bold uppercase tracking-[0.2em] text-white/50">
                <button onclick="goHome()" class="hover:text-white transition">Home</button>
                <button onclick="loadCategory('movie/popular', 'Movies')" class="hover:text-white transition">Movies</button>
                <button onclick="loadCategory('tv/popular', 'Series')" class="hover:text-white transition">Series</button>
                <button onclick="showMyList()" class="hover:text-white transition">My List</button>
            </nav>

            <div class="flex items-center gap-4 border-l border-white/10 pl-4">
                <input type="text" id="searchInput" placeholder="Search..." class="bg-transparent text-xs focus:outline-none w-20 focus:w-40 transition-all text-white placeholder-white/20">
                <div id="searchSuggestions" class="hidden absolute top-full mt-4 right-0 w-[320px] glass-panel rounded-[25px] max-h-96 overflow-y-auto no-scrollbar p-3"></div>
            </div>
        </header>
    </div>

    <main id="mainContainer" class="max-w-[1500px] mx-auto pt-28 px-6 space-y-24">
        
        <section id="heroSection" class="relative w-full h-[60vh] md:h-[80vh] rounded-[45px] overflow-hidden group cursor-grab active:cursor-grabbing">
            <div id="heroContent" class="absolute inset-0 bg-cover bg-center transition-all duration-[2s]"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full p-8 md:p-20 flex flex-col items-center text-center">
                <h2 id="heroTitle" class="text-4xl md:text-8xl font-black mb-4 tracking-tighter leading-none uppercase"></h2>
                <p id="heroDesc" class="text-white/50 text-xs md:text-lg line-clamp-2 mb-10 max-w-2xl font-light"></p>
                <button id="heroPlayBtn" class="bg-white text-black hover:scale-110 px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest transition-all shadow-2xl">Play Now</button>
            </div>
            <div id="heroDots" class="absolute bottom-10 right-10 flex flex-col gap-2"></div>
        </section>

        <div id="homeView" class="space-y-24">
            
            <section>
                <p class="universe-title">Top 10 Trending</p>
                <div id="rowTrending" class="flex gap-10 overflow-x-auto no-scrollbar pb-10 pl-10 cursor-grab active:cursor-grabbing"></div>
            </section>

            <section id="historySection" class="hidden">
                <p class="universe-title">Continue Watching</p>
                <div id="rowHistory" class="flex gap-6 overflow-x-auto no-scrollbar pb-4 cursor-grab active:cursor-grabbing"></div>
            </section>

            <section>
                <p class="universe-title">Marvel Studio</p>
                <div id="rowMarvel" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"></div>
            </section>

            <section>
                <p class="universe-title">DC Universe</p>
                <div id="rowDC" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"></div>
            </section>

            <section>
                <p class="universe-title">Pixar Animation</p>
                <div id="rowPixar" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"></div>
            </section>

            <section>
                <p class="universe-title">Trending People</p>
                <div id="rowActors" class="flex gap-8 overflow-x-auto no-scrollbar pb-4 cursor-grab active:cursor-grabbing"></div>
            </section>

            <section><p class="universe-title">Most Popular</p><div id="row1" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"></div></section>
            <section><p class="universe-title">Anime Collection</p><div id="row3" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing"></div></section>
        </div>

        <section id="gridSection" class="hidden space-y-12">
            <h2 id="gridTitle" class="text-4xl md:text-7xl font-black tracking-tighter opacity-20 uppercase"></h2>
            <div id="gridResults" class="flex flex-wrap justify-center sm:justify-start gap-8"></div>
            <div class="flex justify-center pt-20"><button id="loadMoreBtn" onclick="loadMore()" class="glass-panel px-12 py-5 rounded-full font-black text-xs uppercase tracking-widest hover:bg-white hover:text-black transition">Load More Content</button></div>
        </section>

    </main>

    <div id="playerContainer" class="hidden fixed inset-0 z-[500] flex items-center justify-center bg-black/95 transition-all">
        <button onclick="closePlayer()" class="fixed top-8 right-8 z-[600] text-white/20 hover:text-white text-3xl transition">✕</button>
        <div id="playerModalBox" class="relative w-full h-full md:h-[90vh] md:max-w-6xl md:rounded-[40px] overflow-hidden glass-panel border-white/5 flex flex-col">
            <div class="aspect-video w-full bg-black flex-shrink-0">
                <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="p-8 md:p-12 space-y-10 overflow-y-auto no-scrollbar">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-white/5 pb-10">
                    <h3 id="playingTitle" class="text-3xl md:text-5xl font-black tracking-tighter uppercase"></h3>
                    <div id="playerControls" class="flex gap-3"></div>
                </div>
                <div id="castContainer" class="flex gap-8 overflow-x-auto no-scrollbar"></div>
                <div id="similarContainer" class="flex gap-6 overflow-x-auto no-scrollbar pb-10"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
