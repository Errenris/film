<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOBARGASI | Cinema Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #030305; --accent: #3b82f6; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.07); }
        body { background-color: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        #ambientBg { position: fixed; inset: 0; z-index: -1; transition: background 2s ease; filter: blur(100px) saturate(1.8); opacity: 0.25; transform: scale(1.1); }
        .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg) 90%); z-index: -1; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar-x::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar-x::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .header-capsule { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(30px); border: 1px solid var(--border); padding: 10px 24px; border-radius: 100px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .movie-card { width: 140px; flex-shrink: 0; cursor: pointer; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); position: relative; will-change: transform; transform: translateZ(0); }
        @media (min-width: 768px) { .movie-card { width: 190px; } }
        .movie-card:hover { transform: translateY(-10px); z-index: 10; }
        .poster-container { aspect-ratio: 2/3; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid transparent; transition: 0.3s; background: var(--glass); }
        .movie-card:hover .poster-container { border-color: var(--accent); box-shadow: 0 15px 45px rgba(59, 130, 246, 0.4); }

        .netflix-number { position: absolute; left: -25px; bottom: -10px; font-size: 110px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px rgba(255,255,255,0.15); line-height: 1; z-index: 1; pointer-events: none; }
        @media (min-width: 768px) { .netflix-number { font-size: 160px; left: -35px; } }

        .row-title { font-size: 11px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 20px; padding-left: 10px; }
        .actor-circle { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid transparent; transition: 0.4s; cursor: pointer; }
        .actor-circle:hover { border-color: var(--accent); transform: scale(1.1); }

        /* PROGRESS BAR ALAS NETFLIX */
        .resume-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: rgba(0,0,0,0.5); width: 100%; border-radius: 0 0 20px 20px; overflow: hidden; }
        .resume-progress { height: 100%; background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.06), rgba(255,255,255,0.02)); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; width: 100%; aspect-ratio: 2/3; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* PLAYER INFO UI */
        .player-info-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; }
    </style>
</head>
<body class="pb-20">

    <div id="ambientBg"></div>
    <div class="overlay"></div>

    <div class="fixed top-6 w-full z-[100] flex justify-center px-4">
        <header id="mainHeader" class="header-capsule flex items-center gap-6 md:gap-10">
            <h1 class="text-xl font-black tracking-tighter cursor-pointer" onclick="goHome()">NOBAR<span class="text-blue-500">GASI</span></h1>
            <nav class="hidden lg:flex items-center gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-white/40">
                <button onclick="goHome()" class="hover:text-white transition">Home</button>
                <button onclick="loadCategory('movie/popular', 'Movies')" class="hover:text-white transition">Movies</button>
                <button onclick="loadCategory('tv/popular', 'Series')" class="hover:text-white transition">Series</button>
            </nav>
            <div class="flex items-center gap-4 border-l border-white/10 pl-6">
                <input type="text" id="searchInput" placeholder="Cari Film..." class="bg-transparent text-xs focus:outline-none w-24 focus:w-48 transition-all text-white placeholder-white/20">
                <div id="searchSuggestions" class="hidden absolute top-full mt-5 right-0 w-[320px] glass-panel rounded-[30px] max-h-96 overflow-y-auto no-scrollbar p-3 border border-white/10 shadow-2xl"></div>
            </div>
        </header>
    </div>

    <main id="mainContainer" class="max-w-[1550px] mx-auto pt-24 px-4 md:px-10 space-y-24 fade-in">
        
        <section id="heroSection" class="relative w-full h-[60vh] md:h-[82vh] rounded-[45px] overflow-hidden group cursor-grab active:cursor-grabbing border border-white/5">
            <div id="heroContent" class="absolute inset-0 bg-cover bg-center transition-transform duration-[2.5s] group-hover:scale-105"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full p-8 md:p-20 flex flex-col items-center text-center">
                <h2 id="heroTitle" class="text-3xl md:text-8xl font-black mb-4 tracking-tighter leading-none uppercase drop-shadow-2xl"></h2>
                <p id="heroDesc" class="text-white/40 text-xs md:text-lg line-clamp-2 mb-10 max-w-2xl font-light"></p>
                <button id="heroPlayBtn" class="bg-white text-black hover:bg-blue-500 hover:text-white px-12 py-4 rounded-full font-black text-[11px] uppercase tracking-[0.2em] transition-all shadow-2xl hover:scale-110">Nonton Sekarang</button>
            </div>
            <div id="heroDots" class="absolute bottom-10 right-10 flex flex-col gap-2"></div>
        </section>

        <div id="homeView" class="space-y-28">
            
            <section id="historySection" class="hidden">
                <p class="row-title">Lanjutkan Menonton 🍿</p>
                <div id="rowHistory" class="flex gap-6 overflow-x-auto custom-scrollbar-x pb-4 px-2 cursor-grab active:cursor-grabbing"></div>
            </section>

            <section>
                <p class="row-title">Populer Hari Ini 🔥</p>
                <div id="rowTrending" class="flex gap-10 overflow-x-auto no-scrollbar pb-10 pl-10 cursor-grab active:cursor-grabbing"></div>
            </section>

            <section class="relative overflow-hidden">
                <div class="universe-bg-text">AVENGERS</div>
                <p class="row-title relative z-10">Marvel Cinematic Universe 🦸‍♂️</p>
                <div id="rowMarvel" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing relative z-10 px-2"></div>
            </section>

            <section class="relative overflow-hidden">
                <div class="universe-bg-text">JUSTICE LEAGUE</div>
                <p class="row-title relative z-10">DC Extended Universe 🦇</p>
                <div id="rowDC" class="flex gap-6 overflow-x-auto no-scrollbar cursor-grab active:cursor-grabbing relative z-10 px-2"></div>
            </section>

            <section><p class="row-title">Film Terpopuler ⭐</p><div id="row1" class="flex gap-6 overflow-x-auto no-scrollbar px-2"></div></section>
            <section><p class="row-title">Serial TV Pilihan 📺</p><div id="row2" class="flex gap-6 overflow-x-auto no-scrollbar px-2"></div></section>
            <section><p class="row-title">Koleksi Anime 🌸</p><div id="row3" class="flex gap-6 overflow-x-auto no-scrollbar px-2"></div></section>
        </div>

        <section id="gridSection" class="hidden space-y-12">
            <h2 id="gridTitle" class="text-4xl md:text-7xl font-black tracking-tighter opacity-10 uppercase text-center"></h2>
            <div id="gridResults" class="flex flex-wrap justify-center sm:justify-start gap-6 md:gap-10"></div>
            <div class="flex justify-center pt-20"><button id="loadMoreBtn" onclick="loadMore()" class="glass-panel px-12 py-5 rounded-full font-black text-xs uppercase tracking-widest hover:bg-white hover:text-black transition border border-white/10">Muat Lebih Banyak</button></div>
        </section>

    </main>

    <div id="playerContainer" class="hidden fixed inset-0 z-[500] flex items-center justify-center bg-black/95 transition-all">
        <button onclick="closePlayer()" class="fixed top-8 right-8 z-[600] text-white/30 hover:text-white text-3xl transition">✕</button>
        
        <div id="playerModalBox" class="relative w-full h-full md:h-[95vh] md:max-w-6xl md:rounded-[45px] overflow-y-auto no-scrollbar glass-panel border-white/5 flex flex-col shadow-2xl">
            
            <div class="aspect-video w-full bg-black flex-shrink-0 relative group">
                <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="p-6 md:p-12 space-y-12">
                
                <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                    <div class="space-y-4 flex-1">
                        <div class="flex items-center gap-3 text-[10px] font-black uppercase tracking-widest text-blue-400">
                            <span id="playerRating" class="bg-blue-500/20 px-3 py-1 rounded-full border border-blue-500/30">⭐ 0.0</span>
                            <span id="playerYear">2024</span>
                            <span id="playerRuntime" class="text-white/40">1h 45m</span>
                        </div>
                        <h3 id="playingTitle" class="text-3xl md:text-6xl font-black tracking-tighter uppercase leading-none"></h3>
                        <p id="playerOverview" class="text-white/50 text-sm md:text-lg leading-relaxed max-w-4xl font-light italic"></p>
                    </div>
                    
                    <div id="playerControls" class="flex flex-wrap gap-3"></div>
                </div>

                <div class="player-info-card">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-8">Pemeran Utama</h4>
                    <div id="castContainer" class="flex gap-8 overflow-x-auto no-scrollbar"></div>
                </div>

                <div>
                    <h4 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-8">Rekomendasi Serupa</h4>
                    <div id="similarContainer" class="flex gap-6 overflow-x-auto no-scrollbar pb-10"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
