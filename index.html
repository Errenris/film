<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse - Cinema Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #E50914; --bg: #080808; }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .hero-shadow { background: linear-gradient(0deg, var(--bg) 0%, rgba(8,8,8,0.5) 50%, transparent 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; }
        .movie-card:hover { transform: translateY(-12px) scale(1.03); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-500 px-6 md:px-16 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter text-red-600">STREAMVERSE</h1>
        <div class="relative flex items-center">
            <input type="text" id="searchInput" placeholder="Cari film..." 
                   class="bg-white/10 border border-white/10 px-5 py-2 rounded-full text-sm w-40 md:w-80 outline-none focus:border-red-600 transition-all">
            <button onclick="searchMovie()" class="absolute right-4 opacity-50">🔍</button>
        </div>
    </nav>

    <!-- Hero -->
    <div id="hero" class="relative h-[85vh] flex items-center hidden">
        <div id="heroBg" class="absolute inset-0 bg-cover bg-top"></div>
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="absolute inset-0 hero-shadow"></div>
        <div class="relative z-10 px-8 md:px-20 max-w-4xl">
            <h2 id="heroTitle" class="text-5xl md:text-8xl font-extrabold mb-6 leading-tight"></h2>
            <p id="heroDesc" class="text-gray-300 text-lg mb-8 line-clamp-3"></p>
            <button id="heroPlayBtn" class="bg-white text-black px-12 py-4 rounded-2xl font-bold hover:bg-red-600 hover:text-white transition-all">▶ PLAY NOW</button>
        </div>
    </div>

    <!-- Rows Content -->
    <main class="relative z-20 -mt-32 px-4 md:px-16 space-y-16 pb-20">
        <!-- Search -->
        <section id="searchSection" class="hidden">
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-4">Hasil Pencarian</h2>
            <div id="searchResults" class="flex gap-6 overflow-x-auto no-scrollbar scroll-smooth py-4"></div>
        </section>

        <!-- Row Trending -->
        <section>
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-4">Trending Pekan Ini</h2>
            <div class="relative group">
                <button onclick="sideScroll('trendingRow', 'left')" class="absolute left-[-20px] top-1/2 -translate-y-1/2 z-30 bg-red-600 p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-xl">❮</button>
                <div id="trendingRow" class="flex gap-6 overflow-x-auto no-scrollbar scroll-smooth py-4"></div>
                <button onclick="sideScroll('trendingRow', 'right')" class="absolute right-[-20px] top-1/2 -translate-y-1/2 z-30 bg-red-600 p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-xl">❯</button>
            </div>
        </section>

        <!-- Row Popular -->
        <section>
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-4">Paling Populer</h2>
            <div class="relative group">
                <button onclick="sideScroll('popularRow', 'left')" class="absolute left-[-20px] top-1/2 -translate-y-1/2 z-30 bg-red-600 p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-xl">❮</button>
                <div id="popularRow" class="flex gap-6 overflow-x-auto no-scrollbar scroll-smooth py-4"></div>
                <button onclick="sideScroll('popularRow', 'right')" class="absolute right-[-20px] top-1/2 -translate-y-1/2 z-30 bg-red-600 p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-xl">❯</button>
            </div>
        </section>
    </main>

    <!-- Player Modal -->
    <div id="playerContainer" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closePlayer()"></div>
        <div class="relative w-full max-w-6xl aspect-video glass rounded-3xl overflow-hidden shadow-2xl">
            <button onclick="closePlayer()" class="absolute top-6 right-6 z-50 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-600 transition">✕</button>
            <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
