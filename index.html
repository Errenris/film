<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - Nonton Film Gratis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; font-family: 'Roboto', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-shadow { background: linear-gradient(to top, #141414, transparent); }
        .movie-card { transition: transform 0.3s ease; min-width: 160px; }
        .movie-card:hover { transform: scale(1.08); z-index: 10; }
        @media (min-width: 768px) { .movie-card { min-width: 220px; } }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full z-50 p-4 md:px-12 flex justify-between items-center transition-all duration-300">
        <h1 class="text-2xl md:text-3xl font-extrabold text-red-600">STREAMFLIX</h1>
        <div class="flex items-center gap-3">
            <input type="text" id="searchInput" placeholder="Judul film..." 
                   class="bg-black/40 border border-gray-500 text-sm px-3 py-1.5 rounded focus:outline-none focus:border-white transition">
            <button onclick="searchMovie()" class="bg-red-600 hover:bg-red-700 px-4 py-1.5 rounded text-sm font-bold transition">Cari</button>
        </div>
    </nav>

    <!-- Hero Banner -->
    <div id="hero" class="relative h-[70vh] md:h-[85vh] w-full flex items-center hidden">
        <div id="heroBg" class="absolute inset-0 bg-cover bg-center"></div>
        <div class="absolute inset-0 bg-black/40 hero-shadow"></div>
        <div class="relative z-10 px-6 md:px-12 max-w-3xl">
            <h2 id="heroTitle" class="text-4xl md:text-6xl font-bold mb-4"></h2>
            <p id="heroDesc" class="text-gray-200 text-sm md:text-base mb-6 line-clamp-3 md:line-clamp-4"></p>
            <button id="heroPlayBtn" class="bg-white text-black px-8 py-2.5 rounded font-bold hover:bg-gray-300 transition flex items-center gap-2">
                <span>▶</span> Putar Sekarang
            </button>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="playerContainer" class="hidden fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
        <button onclick="closePlayer()" class="absolute top-5 right-5 text-4xl hover:text-red-600 transition">&times;</button>
        <div class="w-full max-w-6xl aspect-video px-4">
            <iframe id="videoPlayer" src="" class="w-full h-full rounded-lg shadow-2xl" frameborder="0" allowfullscreen></iframe>
        </div>
        <h3 id="playingTitle" class="mt-6 text-xl font-bold tracking-wide"></h3>
    </div>

    <!-- Main Lists -->
    <main class="relative z-20 -mt-20 md:-mt-32 pb-20 space-y-10">
        <!-- Search Row -->
        <section id="searchSection" class="hidden px-6 md:px-12">
            <h2 class="text-xl font-bold mb-4 text-red-500">Hasil Pencarian</h2>
            <div id="searchResults" class="flex gap-4 overflow-x-auto no-scrollbar py-4"></div>
        </section>

        <!-- Trending Row -->
        <section class="px-6 md:px-12">
            <h2 class="text-xl font-bold mb-4">Sedang Tren Sekarang</h2>
            <div id="trendingRow" class="flex gap-4 overflow-x-auto no-scrollbar py-4"></div>
        </section>

        <!-- Action Row -->
        <section class="px-6 md:px-12">
            <h2 class="text-xl font-bold mb-4">Film Aksi & Adrenalin</h2>
            <div id="actionRow" class="flex gap-4 overflow-x-auto no-scrollbar py-4"></div>
        </section>

        <!-- Top Rated Row -->
        <section class="px-6 md:px-12">
            <h2 class="text-xl font-bold mb-4">Pilihan Kritikus (Rating Tinggi)</h2>
            <div id="topRatedRow" class="flex gap-4 overflow-x-auto no-scrollbar py-4"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
