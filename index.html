<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobargasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #05050a; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; background-image: radial-gradient(circle at 15% 50%, rgba(20, 50, 150, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(100, 20, 150, 0.15), transparent 25%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .movie-card { width: 130px; flex-shrink: 0; cursor: pointer; transition: 0.4s; position: relative; }
        @media (min-width: 768px) { .movie-card { width: 165px; } }
        .movie-card:hover { transform: translateY(-8px) scale(1.05); z-index: 20; }
        .poster-container { aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- Header Atas -->
    <header class="fixed top-2 md:top-4 w-full z-[100] px-3 md:px-8">
        <div class="glass-panel max-w-7xl mx-auto rounded-full px-4 py-3 flex justify-between items-center gap-3">
            <div class="flex items-center gap-8">
                <h1 class="text-[16px] md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 cursor-pointer tracking-widest" onclick="goHome()">NOBARGASI BY ERN</h1>
                
                <nav class="hidden md:flex gap-6 text-sm font-semibold text-white/70">
                    <button onclick="goHome()" class="hover:text-white transition">Home</button>
                    <button onclick="loadCategory('movie/popular', 'Movies Popular')" class="hover:text-white transition">Movies</button>
                    <button onclick="loadCategory('tv/popular', 'TV Series Popular')" class="hover:text-white transition">TV Series</button>
                    <button onclick="showMyList()" class="hover:text-red-400 transition flex items-center gap-1">📌 My List</button>
                </nav>
            </div>
            
            <div class="relative w-full max-w-[160px] md:max-w-xs">
                <input type="text" id="searchInput" placeholder="Cari film..." class="w-full bg-black/20 border border-white/10 px-4 py-2 rounded-full text-xs md:text-sm focus:outline-none focus:border-blue-400 transition-all text-white placeholder-gray-400 backdrop-blur-md" 
                       oninput="handleLiveSearch(this.value)" 
                       onkeypress="if(event.key === 'Enter') { doSearch(); }">
                <button onclick="doSearch();" class="absolute right-3 top-1.5 md:top-2 opacity-60 hover:opacity-100 transition text-sm">🔍</button>
                
                <div id="searchSuggestions" class="hidden absolute top-full mt-2 left-0 w-full glass-panel rounded-xl max-h-80 overflow-y-auto custom-scroll z-[150] shadow-2xl flex flex-col p-2 border border-white/10"></div>
            </div>
        </div>
    </header>

    <!-- MENU BAWAH KHUSUS HP -->
    <nav class="md:hidden fixed bottom-4 left-4 right-4 z-[100] glass-panel rounded-full flex justify-around items-center px-4 py-2 shadow-[0_10px_40px_rgba(0,0,0,0.8)]">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-white/70 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] font-bold">Home</span>
        </button>
        <button onclick="loadCategory('movie/popular', 'Movies Popular')" class="flex flex-col items-center gap-1 text-white/70 hover:text-blue-400 transition">
            <span class="text-xl">🎬</span>
            <span class="text-[9px] font-bold">Movies</span>
        </button>
        <button onclick="loadCategory('tv/popular', 'TV Series Popular')" class="flex flex-col items-center gap-1 text-white/70 hover:text-blue-400 transition">
            <span class="text-xl">📺</span>
            <span class="text-[9px] font-bold">Series</span>
        </button>
        <button onclick="showMyList()" class="flex flex-col items-center gap-1 text-white/70 hover:text-red-400 transition">
            <span class="text-xl">📌</span>
            <span class="text-[9px] font-bold">My List</span>
        </button>
    </nav>

    <main class="max-w-7xl mx-auto mt-24 px-4 space-y-8">
        <!-- Hero Carousel -->
        <section id="heroSection" class="relative w-full h-[45vh] md:h-[65vh] rounded-3xl overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.5)] border border-white/10">
            <div id="heroContent" class="absolute inset-0 bg-cover bg-center transition-all duration-1000"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#05050a] via-black/40 to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full p-6 md:p-12 flex flex-col justify-end">
                <h2 id="heroTitle" class="text-2xl md:text-5xl font-black mb-2 drop-shadow-lg"></h2>
                <p id="heroDesc" class="text-white/80 text-xs md:text-base line-clamp-2 mb-4 max-w-2xl drop-shadow-md"></p>
                <div class="flex flex-wrap items-center gap-3">
                    <button id="heroPlayBtn" class="glass-panel hover:bg-white/10 px-6 py-2 md:px-8 md:py-3 rounded-full font-bold text-xs md:text-sm flex items-center gap-2 transition">▶ NONTON</button>
                </div>
            </div>
        </section>

        <!-- Area Hasil Category & Pencarian Full -->
        <section id="gridSection" class="hidden glass-panel rounded-3xl p-4 md:p-6">
            <h2 id="gridTitle" class="text-lg md:text-xl font-bold mb-4 md:mb-6 text-blue-300"></h2>
            <div id="gridResults" class="flex flex-wrap justify-center sm:justify-start gap-3 md:gap-4 pb-4"></div>
            <div class="flex justify-center mt-6">
                <button id="loadMoreBtn" onclick="loadMore()" class="hidden glass-panel hover:bg-white/10 px-8 py-3 rounded-full font-bold transition text-sm">↻ Muat Lebih Banyak</button>
            </div>
        </section>

        <!-- Area My List -->
        <section id="myListSection" class="hidden glass-panel rounded-3xl p-4 md:p-6">
            <h2 class="text-lg md:text-xl font-bold mb-4 md:mb-6 text-red-400">📌 Daftar Favorit Saya</h2>
            <div id="myListResults" class="flex flex-wrap justify-center sm:justify-start gap-3 md:gap-4 pb-4"></div>
        </section>

        <!-- Area Home Default (FULL 10 KATEGORI) -->
        <div id="homeView" class="space-y-8">
            
            <section class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="loadCategory('discover/movie?with_original_language=id', 'Film Indonesia 🇮🇩')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap text-red-400 border-red-500/30">Indonesia 🇮🇩</button>
                <button onclick="loadGenre(28, 'Aksi 💥')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Aksi 💥</button>
                <button onclick="loadGenre(27, 'Horor 👻')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Horor 👻</button>
                <button onclick="loadGenre(35, 'Komedi 😂')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Komedi 😂</button>
                <button onclick="loadGenre(16, 'Animasi 🎨')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Animasi 🎨</button>
                <button onclick="loadGenre(10749, 'Romantis ❤️')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Romantis ❤️</button>
                <button onclick="loadGenre(878, 'Sci-Fi 🚀')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Sci-Fi 🚀</button>
            </section>

            <!-- Row 1: Movies -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Film Terpopuler 🔥</h2>
                    <button onclick="loadCategory('movie/popular', 'Film Terpopuler')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row1" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 2: TV Series -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Serial TV Pilihan 📺</h2>
                    <button onclick="loadCategory('tv/popular', 'Serial TV Pilihan')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row2" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 3: Anime -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Anime Populer 🌸</h2>
                    <button onclick="loadCategory('discover/tv?with_original_language=ja&with_genres=16', 'Anime Populer')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row3" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 4: Drakor -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Drama Korea (Drakor) 🫰</h2>
                    <button onclick="loadCategory('discover/tv?with_original_language=ko', 'Drama Korea')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row4" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 5: Horor -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Malam Jumat Mencekam 👻</h2>
                    <button onclick="loadCategory('discover/movie?with_genres=27', 'Film Horor')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row5" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 6: Action -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Aksi & Pertarungan 💥</h2>
                    <button onclick="loadCategory('discover/movie?with_genres=28', 'Film Aksi')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row6" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 7: Komedi -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Komedi Bikin Ngakak 😂</h2>
                    <button onclick="loadCategory('discover/movie?with_genres=35', 'Film Komedi')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row7" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 8: Romantis -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Romantis & Bikin Baper ❤️</h2>
                    <button onclick="loadCategory('discover/movie?with_genres=10749', 'Film Romantis')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row8" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 9: Sci-Fi -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Sci-Fi & Fantasi 🚀</h2>
                    <button onclick="loadCategory('discover/movie?with_genres=878,14', 'Sci-Fi & Fantasi')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row9" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <!-- Row 10: Animasi -->
            <section class="glass-panel rounded-3xl p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Animasi & Keluarga 🧸</h2>
                    <button onclick="loadCategory('discover/movie?with_genres=16', 'Animasi & Keluarga')" class="text-[10px] md:text-xs text-blue-400 hover:text-white transition">Lihat Semua ➔</button>
                </div>
                <div id="row10" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

        </div>
    </main>

    <!-- Player Modal -->
    <div id="playerContainer" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-2 md:p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closePlayer()"></div>
        <div class="glass-panel relative w-full max-w-5xl rounded-3xl p-2 shadow-2xl">
            <button onclick="closePlayer()" class="absolute -top-3 -right-3 md:-top-5 md:-right-5 glass-btn bg-red-500/80 text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center text-lg z-[210] hover:bg-red-600 shadow-[0_0_15px_rgba(255,0,0,0.5)]">✕</button>
            <div class="aspect-video rounded-2xl overflow-hidden bg-black relative">
                <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="mt-3 px-2 pb-2 flex flex-col md:flex-row justify-between items-center gap-3">
                <h3 id="playingTitle" class="text-sm md:text-lg font-bold text-blue-200 text-center md:text-left w-full"></h3>
                <div class="flex gap-2 w-full justify-center md:justify-end" id="playerControls"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
