<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse - Premium Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #E50914; --bg: #080808; }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hero-gradient { background: linear-gradient(0deg, var(--bg) 0%, transparent 100%); }
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card:hover { transform: translateY(-10px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-500 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-extrabold tracking-tighter text-red-600">STREAMVERSE</h1>
            <div class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-white transition">Home</a>
                <a href="#" class="hover:text-white transition">Movies</a>
                <a href="#" class="hover:text-white transition">New & Popular</a>
            </div>
        </div>
        <div class="flex gap-4">
            <div class="relative group">
                <input type="text" id="searchInput" placeholder="Cari film..." 
                       class="bg-white/10 border border-white/10 px-4 py-2 rounded-full text-sm w-40 md:w-64 focus:w-80 transition-all outline-none focus:border-red-600">
                <button onclick="searchMovie()" class="absolute right-3 top-2 opacity-50">🔍</button>
            </div>
        </div>
    </nav>

    <div id="hero" class="relative h-[90vh] flex items-center hidden">
        <div id="heroBg" class="absolute inset-0 bg-cover bg-top scale-110 blur-[2px]"></div>
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 px-8 md:px-20 max-w-4xl">
            <span class="bg-red-600 text-[10px] font-bold px-2 py-1 rounded mb-4 inline-block tracking-widest uppercase">Trending Hari Ini</span>
            <h2 id="heroTitle" class="text-5xl md:text-8xl font-extrabold mb-6 leading-none"></h2>
            <p id="heroDesc" class="text-gray-300 text-lg mb-8 line-clamp-3 max-w-2xl"></p>
            <div class="flex gap-4">
                <button id="heroPlayBtn" class="bg-white text-black px-10 py-4 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all flex items-center gap-3">
                    <span>▶</span> PLAY NOW
                </button>
            </div>
        </div>
    </div>

    <main class="relative z-20 -mt-32 px-6 md:px-12 space-y-16 pb-20">
        <section id="searchSection" class="hidden">
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-4">Hasil Pencarian</h2>
            <div id="searchResults" class="flex gap-6 overflow-x-auto no-scrollbar py-4"></div>
        </section>

        <section>
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-4">Terpopuler Pekan Ini</h2>
            <div id="trendingRow" class="flex gap-6 overflow-x-auto no-scrollbar py-4"></div>
        </section>

        <section>
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-4">Aksi Terbaik</h2>
            <div id="actionRow" class="flex gap-6 overflow-x-auto no-scrollbar py-4"></div>
        </section>
    </main>

    <div id="playerContainer" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closePlayer()"></div>
        <div class="relative w-full max-w-6xl aspect-video glass rounded-3xl overflow-hidden shadow-[0_0_100px_rgba(229,9,20,0.3)]">
            <button onclick="closePlayer()" class="absolute top-6 right-6 z-50 bg-black/50 w-12 h-12 rounded-full flex items-center justify-center hover:bg-red-600 transition">✕</button>
            <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
