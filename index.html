<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOBARGASI | Premium Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #05050a; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; background-image: radial-gradient(circle at 15% 50%, rgba(20, 50, 150, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(100, 20, 150, 0.15), transparent 25%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .movie-card { width: 130px; flex-shrink: 0; cursor: pointer; transition: 0.4s; position: relative; }
        @media (min-width: 768px) { .movie-card { width: 165px; } }
        .movie-card:hover { transform: translateY(-8px) scale(1.05); z-index: 20; }
        .poster-container { aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        /* CSS Skeleton Loading Animasi Shimmer */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; aspect-ratio: 2/3; width: 100%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="pb-24">

    <header class="fixed top-2 md:top-4 w-full z-[100] px-3 md:px-8">
        <div class="glass-panel max-w-7xl mx-auto rounded-full px-4 py-3 flex justify-between items-center gap-3">
            <div class="flex items-center gap-8">
                <h1 class="text-[16px] md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 cursor-pointer tracking-widest" onclick="goHome()">NOBARGASI</h1>
                
                <nav class="hidden md:flex gap-6 text-sm font-semibold text-white/70">
                    <button onclick="goHome()" class="hover:text-white transition">Home</button>
                    <button onclick="loadCategory('movie/popular', 'Movies Popular')" class="hover:text-white transition">Movies</button>
                    <button onclick="loadCategory('tv/popular', 'TV Series Popular')" class="hover:text-white transition">TV Series</button>
                    <button onclick="showMyList()" class="hover:text-red-400 transition flex items-center gap-1">📌 My List</button>
                </nav>
            </div>
            
            <div class="relative w-full max-w-[160px] md:max-w-xs">
                <input type="text" id="searchInput" placeholder="Cari film..." class="w-full bg-black/20 border border-white/10 px-4 py-2 rounded-full text-xs md:text-sm focus:outline-none focus:border-blue-400 transition-all text-white placeholder-gray-400 backdrop-blur-md" 
                       oninput="handleLiveSearch(this.value)" 
                       onkeypress="if(event.key === 'Enter') { doSearch(); }">
                <button onclick="doSearch();" class="absolute right-3 top-1.5 md:top-2 opacity-60 hover:opacity-100 transition text-sm">🔍</button>
                
                <div id="searchSuggestions" class="hidden absolute top-full mt-2 left-0 w-full glass-panel rounded-xl max-h-80 overflow-y-auto custom-scroll z-[150] shadow-2xl flex flex-col p-2 border border-white/10"></div>
            </div>
        </div>
    </header>

    <button onclick="surpriseMe()" class="fixed bottom-20 right-4 md:bottom-8 md:right-8 z-[150] glass-panel bg-gradient-to-tr from-purple-600 to-blue-500 text-white w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center text-xl md:text-2xl shadow-[0_0_20px_rgba(100,50,255,0.5)] hover:scale-110 transition animate-bounce" title="Acak Film (Surprise Me!)">🎲</button>

    <nav class="md:hidden fixed bottom-4 left-4 right-4 z-[100] glass-panel rounded-full flex justify-around items-center px-4 py-2 shadow-[0_10px_40px_rgba(0,0,0,0.8)]">
        <button onclick="goHome()" class="flex flex-col items-center gap-1 text-white/70 hover:text-blue-400 transition">
            <span class="text-xl">🏠</span><span class="text-[9px] font-bold">Home</span>
        </button>
        <button onclick="loadCategory('movie/popular', 'Movies')" class="flex flex-col items-center gap-1 text-white/70 hover:text-blue-400 transition">
            <span class="text-xl">🎬</span><span class="text-[9px] font-bold">Movies</span>
        </button>
        <button onclick="loadCategory('tv/popular', 'Series')" class="flex flex-col items-center gap-1 text-white/70 hover:text-blue-400 transition">
            <span class="text-xl">📺</span><span class="text-[9px] font-bold">Series</span>
        </button>
        <button onclick="showMyList()" class="flex flex-col items-center gap-1 text-white/70 hover:text-red-400 transition">
            <span class="text-xl">📌</span><span class="text-[9px] font-bold">My List</span>
        </button>
    </nav>

    <main class="max-w-7xl mx-auto mt-24 px-4 space-y-8">
        <section id="heroSection" class="relative w-full h-[45vh] md:h-[65vh] rounded-3xl overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.5)] border border-white/10">
            <div id="heroContent" class="absolute inset-0 bg-cover bg-center transition-all duration-1000"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#05050a] via-black/40 to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full p-6 md:p-12 flex flex-col justify-end">
                <h2 id="heroTitle" class="text-2xl md:text-5xl font-black mb-2 drop-shadow-lg"></h2>
                <p id="heroDesc" class="text-white/80 text-xs md:text-base line-clamp-2 mb-4 max-w-2xl drop-shadow-md"></p>
                <div class="flex flex-wrap items-center gap-3">
                    <button id="heroPlayBtn" class="glass-panel hover:bg-white/10 px-6 py-2 md:px-8 md:py-3 rounded-full font-bold text-xs md:text-sm flex items-center gap-2 transition">▶ NONTON</button>
                </div>
            </div>
        </section>

        <section id="gridSection" class="hidden glass-panel rounded-3xl p-4 md:p-6">
            <h2 id="gridTitle" class="text-lg md:text-xl font-bold mb-4 md:mb-6 text-blue-300"></h2>
            <div id="gridResults" class="flex flex-wrap justify-center sm:justify-start gap-3 md:gap-4 pb-4"></div>
            <div class="flex justify-center mt-6">
                <button id="loadMoreBtn" onclick="loadMore()" class="hidden glass-panel hover:bg-white/10 px-8 py-3 rounded-full font-bold transition text-sm">↻ Muat Lebih Banyak</button>
            </div>
        </section>

        <section id="myListSection" class="hidden glass-panel rounded-3xl p-4 md:p-6">
            <h2 class="text-lg md:text-xl font-bold mb-4 md:mb-6 text-red-400">📌 Daftar Favorit Saya</h2>
            <div id="myListResults" class="flex flex-wrap justify-center sm:justify-start gap-3 md:gap-4 pb-4"></div>
        </section>

        <div id="homeView" class="space-y-8">
            
            <section class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="toggleFilterPanel()" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap bg-blue-500/20 text-blue-300 border-blue-400/50">⚙️ Filter Spesifik</button>
                
                <button onclick="loadGenre(28, 'Aksi 💥')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Aksi 💥</button>
                <button onclick="loadGenre(27, 'Horor 👻')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Horor 👻</button>
                <button onclick="loadGenre(35, 'Komedi 😂')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Komedi 😂</button>
                <button onclick="loadGenre(16, 'Animasi 🎨')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Animasi 🎨</button>
                <button onclick="loadGenre(10749, 'Romantis ❤️')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Romantis ❤️</button>
                <button onclick="loadGenre(878, 'Sci-Fi 🚀')" class="glass-btn px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">Sci-Fi 🚀</button>
            </section>

            <div id="filterPanel" class="hidden glass-panel p-4 rounded-2xl flex flex-wrap gap-4 items-end border border-blue-500/30">
                <div>
                    <label class="block text-[10px] text-white/50 mb-1">Tahun Rilis</label>
                    <input type="number" id="filterYear" placeholder="Contoh: 2023" class="bg-black/30 border border-white/10 px-3 py-1.5 rounded-lg text-sm text-white w-28 focus:border-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-white/50 mb-1">Minimal Rating (1-10)</label>
                    <input type="number" id="filterRating" placeholder="Contoh: 7" max="10" min="1" class="bg-black/30 border border-white/10 px-3 py-1.5 rounded-lg text-sm text-white w-28 focus:border-blue-400 outline-none">
                </div>
                <button onclick="applyFilters()" class="glass-btn bg-blue-500/80 hover:bg-blue-600 px-6 py-1.5 rounded-lg text-sm font-bold transition">Terapkan Filter 🔍</button>
            </div>

            <section id="historySection" class="hidden glass-panel rounded-3xl p-4 md:p-6 border border-blue-500/30 bg-blue-900/10">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base md:text-xl font-bold text-white tracking-wide">Lanjutkan Menonton 🍿</h2>
                    <button onclick="clearHistory()" class="text-[10px] md:text-xs text-red-400 hover:text-white transition">Hapus Riwayat ✕</button>
                </div>
                <div id="rowHistory" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4 pt-1"></div>
            </section>

            <section class="glass-panel rounded-3xl p-4 md:p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-base md:text-xl font-bold">Film Terpopuler 🔥</h2><button onclick="loadCategory('movie/popular', 'Film Terpopuler')" class="text-[10px] md:text-xs text-blue-400">Lihat Semua ➔</button></div><div id="row1" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 pt-1"></div></section>
            <section class="glass-panel rounded-3xl p-4 md:p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-base md:text-xl font-bold">Serial TV Pilihan 📺</h2><button onclick="loadCategory('tv/popular', 'Serial TV Pilihan')" class="text-[10px] md:text-xs text-blue-400">Lihat Semua ➔</button></div><div id="row2" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 pt-1"></div></section>
            <section class="glass-panel rounded-3xl p-4 md:p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-base md:text-xl font-bold">Anime Populer 🌸</h2><button onclick="loadCategory('discover/tv?with_original_language=ja&with_genres=16', 'Anime Populer')" class="text-[10px] md:text-xs text-blue-400">Lihat Semua ➔</button></div><div id="row3" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 pt-1"></div></section>
            <section class="glass-panel rounded-3xl p-4 md:p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-base md:text-xl font-bold">Drama Korea (Drakor) 🫰</h2><button onclick="loadCategory('discover/tv?with_original_language=ko', 'Drama Korea')" class="text-[10px] md:text-xs text-blue-400">Lihat Semua ➔</button></div><div id="row4" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 pt-1"></div></section>
            <section class="glass-panel rounded-3xl p-4 md:p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-base md:text-xl font-bold">Malam Jumat Mencekam 👻</h2><button onclick="loadCategory('discover/movie?with_genres=27', 'Film Horor')" class="text-[10px] md:text-xs text-blue-400">Lihat Semua ➔</button></div><div id="row5" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 pt-1"></div></section>
            <section class="glass-panel rounded-3xl p-4 md:p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-base md:text-xl font-bold">Aksi & Pertarungan 💥</h2><button onclick="loadCategory('discover/movie?with_genres=28', 'Film Aksi')" class="text-[10px] md:text-xs text-blue-400">Lihat Semua ➔</button></div><div id="row6" class="flex gap-3 md:gap-4 overflow-x-auto no-scrollbar pb-4 pt-1"></div></section>
        </div>
    </main>

    <div id="playerContainer" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-2 md:p-4 overflow-hidden">
        <div id="playerBg" class="absolute inset-0 bg-cover bg-center opacity-40 blur-[50px] transform scale-110 z-0 transition-all duration-1000"></div>
        <div class="absolute inset-0 bg-black/60 z-0" onclick="closePlayer()"></div>
        
        <div class="glass-panel relative w-full max-w-5xl rounded-3xl p-2 md:p-4 shadow-2xl z-10 flex flex-col max-h-screen overflow-y-auto no-scrollbar border border-white/20">
            <button onclick="closePlayer()" class="absolute top-2 right-2 md:top-4 md:right-4 glass-btn bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center text-lg z-[210] hover:bg-red-600 transition">✕</button>
            
            <div class="aspect-video rounded-2xl overflow-hidden bg-black relative shadow-lg">
                <iframe id="videoPlayer" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="mt-4 px-2 flex flex-col md:flex-row justify-between items-start md:items-center gap-3 border-b border-white/10 pb-4">
                <h3 id="playingTitle" class="text-lg md:text-2xl font-black text-white drop-shadow-md"></h3>
                <div class="flex gap-2 w-full md:w-auto" id="playerControls"></div>
            </div>

            <div class="px-2 mt-3 mb-2">
                <h4 class="text-[10px] font-bold text-white/50 uppercase tracking-widest mb-2">Pemeran Utama</h4>
                <div id="castContainer" class="flex gap-3 overflow-x-auto no-scrollbar pb-2 items-start">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
